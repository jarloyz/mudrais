[unix_http_server]
file=/var/run/supervisor.sock
chmod=0770
chown=root:sail

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

; ── Web server ────────────────────────────────────────────────────────────────
[program:php]
command=%(ENV_SUPERVISOR_PHP_COMMAND)s
user=%(ENV_SUPERVISOR_PHP_USER)s
environment=LARAVEL_SAIL="1"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ── Laravel Horizon — gestiona todos los workers con autoescalado ─────────────
; supervisor-index:  min=2  max=8   (index queue, LLM pesado 120B)
; supervisor-tags:   min=6  max=28  (tags queue, LLM warmup luego embedding)
; supervisor-general min=2  max=4   (high/default/sync)
; Total:             min=10 max=40
[program:horizon]
process_name=%(program_name)s
command=php /var/www/html/artisan horizon
user=%(ENV_SUPERVISOR_PHP_USER)s
environment=LARAVEL_SAIL="1"
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stopwaitsecs=3600
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
