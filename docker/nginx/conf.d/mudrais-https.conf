# ── Phase 2: Full HTTPS ───────────────────────────────────────────────────────
# Active after certbot has issued the certificate.
# Both domains share the same Laravel app (PHP-FPM on app:9000).
# Laravel routing (Route::domain) handles the separation at the application layer.
# ─────────────────────────────────────────────────────────────────────────────

# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name mudrais.com app.mudrais.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health-nginx {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── mudrais.com — public landing ─────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name mudrais.com;

    ssl_certificate     /etc/letsencrypt/live/mudrais.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mudrais.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000" always;

    root  /var/www/html/public;
    index index.php;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   app:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param  SERVER_NAME $host;
        include        fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}

# ── app.mudrais.com — admin panel + API + OAuth ───────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name app.mudrais.com;

    ssl_certificate     /etc/letsencrypt/live/mudrais.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mudrais.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000" always;

    root  /var/www/html/public;
    index index.php;

    # Discord webhook payloads can be large; Filament uploads need headroom
    client_max_body_size 100M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   app:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param  SERVER_NAME $host;
        include        fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
