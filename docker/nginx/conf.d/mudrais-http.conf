# ── Phase 1: HTTP only ────────────────────────────────────────────────────────
# Active during initial SSL certificate issuance.
# Steps:
#   1. Deploy with this config active (rename mudrais-https.conf to mudrais-https.conf.disabled)
#   2. Run: docker compose -f docker-compose.prod.yml run --rm certbot certonly \
#              --webroot --webroot-path=/var/www/certbot \
#              -d mudrais.com -d app.mudrais.com \
#              --email your@email.com --agree-tos --no-eff-email
#   3. Rename mudrais-https.conf.disabled back to mudrais-https.conf
#   4. Reload nginx: docker compose -f docker-compose.prod.yml exec nginx nginx -s reload
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name mudrais.com app.mudrais.com;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check for compose (no redirect needed during init)
    location /health-nginx {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # All other traffic → 200 during init so certbot can verify domain ownership
    location / {
        return 200 "MUDRAIS — SSL initialization in progress\n";
        add_header Content-Type text/plain;
    }
}
